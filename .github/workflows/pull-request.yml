name: Pull Request

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  version-check:
    runs-on: ubuntu-latest
    # Dependabot PRs never bump the project version; exempt them so their
    # dependency updates still run lint/unit/e2e. When an unbumped PR merges,
    # the publish workflow on main detects the already-released version and
    # auto-bumps a minor before building and publishing.
    if: github.actor != 'dependabot[bot]'
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Check for version bump
      run: |
        # Determine the target branch (default to main if not in PR context)
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          TARGET_BRANCH="${{ github.base_ref }}"
        else
          TARGET_BRANCH="main"
        fi
        echo "Target branch: $TARGET_BRANCH"

        # Check if pyproject.toml was modified
        if ! git diff --name-only origin/$TARGET_BRANCH HEAD | grep -q 'pyproject.toml'; then
          echo "Error: pyproject.toml must be modified to include a version bump."
          exit 1
        fi

        # Extract the version from target branch
        git checkout origin/$TARGET_BRANCH -- pyproject.toml
        TARGET_VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = //g' | sed 's/"//g' | sed "s/'//g" | tr -d ' ')
        git checkout HEAD -- pyproject.toml

        # Extract the current version
        PR_VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = //g' | sed 's/"//g' | sed "s/'//g" | tr -d ' ')

        # Print versions prominently
        echo "==============================="
        echo "CURRENT VERSION: $PR_VERSION"
        echo "TARGET BRANCH VERSION: $TARGET_VERSION"
        echo "==============================="

        # Compare versions using sort -V (version sort)
        if [ "$TARGET_VERSION" = "$PR_VERSION" ]; then
          echo "Error: Version in PR ($PR_VERSION) must be higher than version in target branch ($TARGET_VERSION)"
          exit 1
        elif ! printf '%s\n%s\n' "$TARGET_VERSION" "$PR_VERSION" | sort -V -C; then
          echo "Error: Version in PR ($PR_VERSION) must be higher than version in target branch ($TARGET_VERSION)"
          exit 1
        else
          echo "✅ Version bump verified: $TARGET_VERSION -> $PR_VERSION"
        fi

  lint:
    needs: [version-check]
    # Run when version-check succeeded OR was skipped (Dependabot exemption).
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-lint-deps
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-lint-deps.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --extras observability

    - name: Ensure dependencies are available
      if: steps.cached-lint-deps.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-root --extras observability

    - name: Linting and code quality
      run: |
        poetry run pre-commit run --all-files --show-diff-on-failure

  unit:
    needs: [version-check]
    # Run when version-check succeeded OR was skipped (Dependabot exemption).
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --extras observability

    - name: Ensure dependencies are available
      if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-root --extras observability

    - name: Run unit tests
      run: |
        poetry run pytest tests/ --ignore=tests/e2e --cov=flux --cov-report=xml --cov-report=html --cov-report=term

    - name: Archive coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 14

  migrations-postgres:
    needs: [version-check]
    # Run when version-check succeeded OR was skipped (Dependabot exemption).
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux_test_user
          POSTGRES_PASSWORD: flux_test_password
          POSTGRES_DB: flux_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flux_test_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction --extras postgresql

    # Validates PostgreSQL-only behaviors against a real server: the migration
    # runner (fresh-DB chain, legacy stamp-and-upgrade with index backfill,
    # idempotent re-runs) and the scheduler dispatch advisory lock (exclusive
    # acquisition across connections).
    - name: Run PostgreSQL-only tests
      env:
        FLUX_DATABASE_URL: postgresql://flux_test_user:flux_test_password@localhost:5432/flux_test
        FLUX_DATABASE_TYPE: postgresql
        FLUX_WORKERS__BOOTSTRAP_TOKEN: ci-token
        FLUX_SECURITY__ENCRYPTION__ENCRYPTION_KEY: ci-encryption-key-0000000000000000
      run: |
        poetry run pytest \
          tests/flux/test_migrations_postgresql.py \
          tests/flux/test_scheduler_dispatch_lock.py \
          -m postgresql -v

  perf-postgres:
    needs: [version-check]
    # Run when version-check succeeded OR was skipped (Dependabot exemption).
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flux_perf_user
          POSTGRES_PASSWORD: flux_perf_password
          POSTGRES_DB: flux_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flux_perf_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Install dependencies
      run: poetry install --no-interaction --extras postgresql

    # Progress-streaming perf suite (tests/perf/PLAN.md) against a real
    # server + worker on PostgreSQL — the production backend. The suite is
    # opt-in (FLUX_PERF=1); only correctness-gated tests (T0) run in CI,
    # latency/throughput characterization runs on dedicated hardware.
    - name: Run perf suite (PostgreSQL)
      env:
        FLUX_PERF: "1"
        FLUX_PERF_DATABASE_URL: postgresql://flux_perf_user:flux_perf_password@localhost:5432/flux_perf
      run: |
        poetry run pytest tests/perf -m perf -v

    - name: Archive perf results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: perf-results
        path: |
          tests/perf/results/
          tests/perf/RESULTS.md
        retention-days: 14

  e2e:
    needs: [version-check]
    # Run when version-check succeeded OR was skipped (Dependabot exemption).
    if: ${{ !cancelled() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-e2e-deps
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-e2e-deps.outputs.cache-hit != 'true'
      run: poetry install --no-interaction

    - name: Ensure dependencies are available
      if: steps.cached-e2e-deps.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-root

    - name: Run E2E tests
      run: |
        poetry run pytest tests/e2e/ -m "not ollama and not network" -v
