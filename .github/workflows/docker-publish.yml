name: Build and Publish Docker Image

on:
  workflow_run:
    workflows: ["Build and Publish"]
    types:
      - completed
    branches: [ main ]
  push:
    tags: [ 'v*' ]
  workflow_dispatch:  # Allow manual triggering

env:
  REGISTRY: docker.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Only run if the previous workflow completed successfully, or if triggered by tag/manual dispatch
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Extract version from pyproject.toml
      id: version
      run: |
        VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/flux
        # Version tags come from pyproject.toml (extracted above) rather than
        # the git ref: the main publish path is workflow_run (ref
        # refs/heads/main), where plain type=semver entries would never fire.
        # The explicit value makes every main publish also produce X.Y.Z and
        # X.Y, which is what docker-runner users pin docker_image to. (The
        # v* git tags build-publish pushes post-release stay in sync since
        # both derive from the same pyproject version.)
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
          type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          FLUX_VERSION=${{ steps.version.outputs.version }}
          FLUX_EXTRAS=postgresql,observability,ai
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/flux
        subject-digest: ${{ steps.build.outputs.digest }}
        push-to-registry: true
