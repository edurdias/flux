name: Build and Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

# The build job may push an automatic version-bump commit to main.
permissions:
  contents: write

# Serialize main builds so two merges can't race on the auto-bump.
concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-extras-observability-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --extras observability

    - name: Ensure dependencies are available
      if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-root --extras observability

    - name: Linting and code quality
      run: |
        poetry run pre-commit run --all-files --show-diff-on-failure

    - name: Run tests
      run: |
        poetry run pytest tests/ -m "not ollama and not network" --cov=flux --cov-report=xml --cov-report=html --cov-report=term

    - name: Archive coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 14

    - name: Check whether this version is already on PyPI
      id: version-exists
      run: |
        VERSION=$(poetry version -s)
        if curl -fsSL "https://pypi.org/pypi/flux-core/${VERSION}/json" -o /dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "flux-core ${VERSION} already on PyPI - an unbumped merge (e.g. Dependabot); will auto-bump."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "flux-core ${VERSION} not yet on PyPI."
        fi

    # Unbumped merges (Dependabot's grouped updates don't touch the version)
    # get an automatic minor bump committed back to main, after tests passed
    # and before the wheel is built. Pushes made with GITHUB_TOKEN do not
    # retrigger workflows, so this cannot loop; the concurrency group above
    # prevents two merges racing on the bump.
    - name: Auto-bump minor version for unbumped merge
      if: github.ref == 'refs/heads/main' && steps.version-exists.outputs.exists == 'true'
      run: |
        poetry version minor
        NEW_VERSION=$(poetry version -s)
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml
        git commit -m "Bump version to ${NEW_VERSION}"
        git push origin HEAD:main
        echo "Auto-bumped to ${NEW_VERSION}"

    - name: Build package
      run: poetry build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      if: github.ref == 'refs/heads/main'
      run: |
        poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
        poetry publish --no-interaction

    # Tag the exact commit each published version shipped from. Runs after
    # the PyPI publish so a failed publish never leaves a tag behind.
    # GITHUB_TOKEN pushes don't retrigger workflows, so the docker-publish
    # `push: tags` trigger stays quiet here — the image build still arrives
    # via workflow_run and mints its version tags from pyproject.
    - name: Tag the release
      if: github.ref == 'refs/heads/main'
      run: |
        VERSION=$(poetry version -s)
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
          echo "Tag v${VERSION} already exists; skipping."
        else
          git tag -a "v${VERSION}" -m "flux-core ${VERSION}"
          git push origin "v${VERSION}"
        fi
