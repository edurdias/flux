name: Build and Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.7.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-extras-observability-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --extras observability

    - name: Ensure dependencies are available
      if: steps.cached-poetry-dependencies.outputs.cache-hit == 'true'
      run: poetry install --no-interaction --no-root --extras observability

    - name: Linting and code quality
      run: |
        poetry run pre-commit run --all-files --show-diff-on-failure

    - name: Run tests
      run: |
        poetry run pytest tests/ -m "not ollama and not network" --cov=flux --cov-report=xml --cov-report=html --cov-report=term

    - name: Archive coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 14

    - name: Build package
      run: poetry build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist
        path: dist/

    - name: Check whether this version is already on PyPI
      id: version-exists
      run: |
        VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = //g' | sed 's/"//g' | tr -d ' ')
        if curl -fsSL "https://pypi.org/pypi/flux-core/${VERSION}/json" -o /dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "flux-core ${VERSION} already on PyPI - skipping publish (expected for merges that don't bump, e.g. Dependabot)."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "flux-core ${VERSION} not yet on PyPI - will publish."
        fi

    - name: Publish to PyPI
      if: github.ref == 'refs/heads/main' && steps.version-exists.outputs.exists == 'false'
      run: |
        poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
        poetry publish --no-interaction
